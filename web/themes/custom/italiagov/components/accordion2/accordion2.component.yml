name: 'Accordion 2 Item'
description: 'The accordion uses collapse internally to make it collapsible. https://italia.github.io/bootstrap-italia/docs/componenti/accordion/'
slots:
  accordion_title:
    title: 'Title (field, no link)'
    description: 'Accordion title. Without link.'
  accordion_content:
    title: 'Content (fields)'
    description: 'Accordion content.'
props:
  type: object
  properties:
    item_title_tag:
      title: 'Title tag'
      type: string
      enum:
        - h2
        - h3
        - h4
        - h5
        - h6
      'meta:enum':
        h2: 'Heading 2 (h2)'
        h3: 'Heading 3 (h3)'
        h4: 'Heading 4 (h4)'
        h5: 'Heading 5 (h5)'
        h6: 'Heading 6 (h6)'
