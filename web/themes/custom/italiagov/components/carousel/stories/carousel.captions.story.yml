name: Captions
slots:
  slides:
    - type: component
      component: "italiagov:carousel_item"
      slots:
        image:
          theme: image
          uri: "data:image/svg+xml;base64,"
        caption:
          - type: html_tag
            tag: h5
            value: "First slide label"
          - type: html_tag
            tag: p
            value: "Some representative placeholder content for the first slide."
    - type: component
      component: "italiagov:carousel_item"
      slots:
        image:
          theme: image
          uri: "data:image/svg+xml;base64,"
        caption:
          - type: html_tag
            tag: h5
            value: "Second slide label"
          - type: html_tag
            tag: p
            value: "Some representative placeholder content for the second slide."
    - type: component
      component: "italiagov:carousel_item"
      slots:
        image:
          theme: image
          uri: "data:image/svg+xml;base64,"
        caption:
          - type: html_tag
            tag: h5
            value: "Third slide label"
          - type: html_tag
            tag: p
            value: "Some representative placeholder content for the third slide."
props:
  with_controls: true
  with_indicators: true
  with_touch: true
  interval: 0
