name: Preview
slots:
  cards:
    - type: component
      component: "italiagov:card"
      slots:
        image:
          theme: image
          uri: "data:image/svg+xml;base64,"
          alt: "&copy; 2017 John Smith photography"
        content:
          - type: component
            component: "italiagov:card_body"
            slots:
              title: "Card title"
              text: "This is a wider card with supporting text below as a natural lead-in to additional content. This content is a little bit longer."
              content:
                type: html_tag
                tag: p
                0:
                  type: html_tag
                  tag: small
                  value: Last updated 3 mins ago
                  attributes:
                    class:
                      - text-body-secondary
                attributes:
                  class:
                    - card-text
      props:
        variant: default
