$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: ULA Sem Card
status: experimental
description: >
  Tarjeta de semestre del recorrido académico: etiqueta de semestre, uno o dos logos
  de universidad, pastilla de universidad (texto), título y descripción enriquecida
  (HTML: las asignaturas como lista). Componente autónomo del design system ULA. Se
  compone dentro del slot 'journey_semesters'. El contenedor (.journey-track) y los
  conectores (.journey-connector) los aporta la sección. Todas las tarjetas igualan su
  altura a la más alta (la rejilla las estira; el cuerpo crece y el footer queda abajo).
props:
  type: object
  properties:
    semester:
      type: string
      title: Semester
      description: 'Etiqueta del semestre (p. ej. "Semester 1").'
    logos:
      type: array
      title: Logos
      description: 'Una o dos URLs de logo de universidad. Se muestran con altura normalizada.'
      items:
        type: string
    university:
      type: string
      title: University
      description: 'Universidad y ciudad (p. ej. "UAB · Barcelona"), como texto.'
    title:
      type: string
      title: Title
      description: 'Título temático del semestre.'
    description:
      type: string
      title: Description (HTML)
      description: 'Descripción enriquecida (HTML saneado): las asignaturas como lista. Se renderiza sin escapar.'
    variant:
      type: string
      title: Variant
      description: 'Variante de color (logos y pastilla de universidad) según el semestre.'
      enum:
        - '1'
        - '2'
        - '3'
        - '4'
      default: '1'
