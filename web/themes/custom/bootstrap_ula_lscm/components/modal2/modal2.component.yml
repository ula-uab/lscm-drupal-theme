name: 'Modal 2'
description: 'https://italia.github.io/bootstrap-italia/docs/componenti/modale/'
variants:
  default:
    title: Default
    description: 'https://italia.github.io/bootstrap-italia/docs/componenti/modale/'
slots:
  modal_title:
    title: 'Title (raw text).'
    description: 'Enter a title in raw text.'
  modal_body:
    title: 'Body (field).'
    description: 'Enter a body. Wrap text in <p> tag'
  modal_footer:
    title: 'Footer (field).'
    description: 'Enter a footer.'
  modal_icon:
    title: 'Icon (eg. it-name, raw text)'
    description: 'https://italia.github.io/bootstrap-italia/docs/utilities/icone/'
  modal_label:
    title: 'Button label (raw text)'
    description: 'Customize button label'
props:
  type: object
  properties:
    button_attributes:
      title: "Button attributes"
      description: "The attributes to customize the tag with the button."
      $ref: "ui-patterns://attributes"
    popconfirm:
      title: Popconfirm
      description: 'Enable popconfirm feature. https://italia.github.io/bootstrap-italia/docs/componenti/modale/#modale-popconfirm'
      type: boolean
    modal_default_icon:
      title: 'Default icon'
      description: 'Choose default icon. Eg: it-name'
      type: string
    modal_position:
      title: 'Modal Position'
      description: 'Choose modal position.'
      type: string
      enum:
        - centered
        - left
        - right
      'meta:enum':
        centered: Centered
        left: Left
        right: Right
    modal_size:
      title: 'Modal Size'
      description: 'Choose modal size.'
      type: string
      enum:
        - sm
        - lg
        - xl
        - fullscreen
        - fullscreen-sm-down
        - fullscreen-lg-down
        - fullscreen-xl-down
      'meta:enum':
        sm: Small
        lg: Large
        xl: 'Extra large'
        fullscreen: Fullscreen
        fullscreen-sm-down: 'Fullscreen SM down'
        fullscreen-lg-down: 'Fullscreen LG down'
        fullscreen-xl-down: 'Fullscreen XL down'
