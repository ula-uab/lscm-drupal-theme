$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: LSCM Master Page
status: experimental
description: >
  Marco de la landing page del máster LSCM. Compone los componentes ula_* en sus secciones
  (hero, about, journey, universities, specializations, why, admission) con su diseño fiel
  a la maqueta, e independiente de Bootstrap Italia. Los textos de página son props editables
  (mapeables a campos de un bloque de contenido). Las colecciones de ítems van como contenido
  fijo en el Twig (decisión: contenido casi estático). El menú hamburguesa y las pastillas
  interactivas quedan para una iteración posterior.
props:
  type: object
  properties:
    # --- Marca / logo ---
    logo_url:
      type: string
      title: Logo URL
      description: 'URL del logo del máster.'
      default: '/sites/default/files/2026-06/logo-MASTER-LSCM.png'
    brand_top:
      type: string
      title: Brand (línea principal)
      default: 'LSCM Master'
    brand_sub:
      type: string
      title: Brand (subtítulo)
      default: 'European Joint Programme'
    # --- Hero ---
    hero_badge_text:
      type: string
      title: Hero · badge
      default: "Erasmus+ Joint Master's Programme"
    hero_title:
      type: string
      title: Hero · título (1ª línea)
      default: 'Shape the Future of'
    hero_title_highlight:
      type: string
      title: Hero · título (2ª línea, resaltada)
      default: 'European Logistics'
    hero_description:
      type: string
      maxLength: 1000
      title: Hero · descripción
      default: "A 120 ECTS joint master's degree taught across three European universities. Study in Barcelona, Riga, and specialise in Germany — all in one programme."
    hero_cta1_text:
      type: string
      title: Hero · botón primario (texto)
      default: 'Apply Now'
    hero_cta1_url:
      type: string
      title: Hero · botón primario (URL)
      default: '/admission'
    hero_cta2_text:
      type: string
      title: Hero · botón secundario (texto)
      default: 'Explore Programme'
    hero_cta2_url:
      type: string
      title: Hero · botón secundario (URL)
      default: '/programme'
    # --- About ---
    about_tag:
      type: string
      title: About · tag
      default: 'Master in Logistics & Supply Chain Management'
    about_title:
      type: string
      title: About · título
      default: 'Integrated. International. Industry-Ready.'
    about_desc:
      type: string
      maxLength: 1000
      title: About · descripción
      default: 'A programme designed to train professionals capable of making decisions at operational, tactical, and strategic level — from a holistic and interdisciplinary perspective.'
    about_cta_text:
      type: string
      title: About · botón de salto (texto)
      default: 'Learn more about the programme'
    about_cta_url:
      type: string
      title: About · botón de salto (URL)
      default: '/about'
    # --- Journey ---
    journey_tag:
      type: string
      default: 'Your academic path'
    journey_title:
      type: string
      default: 'Four Semesters Across Europe'
    journey_desc:
      type: string
      maxLength: 1000
      default: 'A carefully structured curriculum that builds from core foundations to deep specialisation, moving across three countries.'
    journey_cta_text:
      type: string
      default: 'See full curriculum'
    journey_cta_url:
      type: string
      default: '/programme'
    # --- Universities ---
    uni_tag:
      type: string
      default: 'Our partner institutions'
    uni_title:
      type: string
      default: 'Three Countries. One Programme.'
    uni_desc:
      type: string
      maxLength: 1000
      default: 'A consortium of established European universities, each contributing their unique expertise and research strengths to the programme.'
    uni_cta_text:
      type: string
      default: 'Meet the partner universities'
    uni_cta_url:
      type: string
      default: '/partners'
    # --- Specializations ---
    spec_tag:
      type: string
      default: 'Choose your track'
    spec_title:
      type: string
      default: 'Two Specialisations, One Qualification'
    spec_desc:
      type: string
      maxLength: 1000
      default: 'Your choice of specialisation in year two shapes your career direction. Both lead to the same joint diploma.'
    spec_cta_text:
      type: string
      default: 'Explore specialisations'
    spec_cta_url:
      type: string
      default: '/specialisations'
    # --- Admission ---
    adm_tag:
      type: string
      default: 'Admissions'
    adm_title:
      type: string
      default: 'Ready to Apply?'
    adm_desc:
      type: string
      maxLength: 1000
      default: 'Applications are reviewed on a rolling basis. EU applicants are encouraged to apply as early as possible.'
    adm_cta_text:
      type: string
      default: 'See full admission details'
    adm_cta_url:
      type: string
      default: '/admission'
    # --- Get in touch (CTA final) ---
    contact_tag:
      type: string
      default: 'Get in touch'
    contact_title:
      type: string
      default: 'Still have questions?'
    contact_desc:
      type: string
      maxLength: 1000
      default: "Our programme coordinators are happy to help. Reach out before you apply and we'll guide you through the process."
    contact_email:
      type: string
      title: Get in touch · email
      default: 'info@master-lscm.eu'
    contact_faq_text:
      type: string
      default: 'Read FAQs'
    contact_faq_url:
      type: string
      default: 'https://master-lscm.eu/faq'

# Carga la librería base de la landing (reset, .container, .section-*, .btn-*, .reveal)
# solo cuando se renderiza este marco. ula_landing_base ya depende de ula_tokens.
# El JS (animaciones reveal al hacer scroll) se mantiene como asset propio del componente.
libraryOverrides:
  js:
    lscm-master-page.js: {}
  dependencies:
    - bootstrap_ula_lscm/ula_landing_base
    - core/drupal
