$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'
name: ULA Spec Card
status: experimental
description: >
  Tarjeta de especialización: cabecera con imagen de fondo (overlay + título +
  ubicación superpuestos) y cuerpo con descripción enriquecida (HTML: párrafos y
  listas). Componente autónomo del design system ULA. Se compone dentro del slot
  'specializations'. El contenedor en rejilla (.spec-grid) lo aporta la sección.
props:
  type: object
  properties:
    title:
      type: string
      title: Title
      description: 'Nombre de la especialización (se superpone sobre la imagen).'
    location:
      type: string
      title: Location
      description: 'Ubicación: universidad y país (p. ej. "Riga Technical University · Latvia"). Se superpone sobre la imagen.'
    image:
      type: string
      title: Image URL
      description: 'URL de la imagen de fondo de la cabecera. Si está vacía, la cabecera usa un fondo de color de respaldo.'
    description:
      type: string
      title: Description (HTML)
      description: 'Descripción enriquecida (HTML ya saneado: párrafos y listas). Se renderiza sin escapar.'
