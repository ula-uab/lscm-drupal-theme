name: "Navigation: pills"
slots:
  header:
    - type: component
      component: "bootstrap_ula_lscm:nav"
      props:
        variant: pills
        nav_type: ul
        card_header: true
        items:
          - url: "#"
            title: Active
            link_attributes:
              class:
                - active
          - url: "#"
            title: Link
          - url: "#"
            title: Disabled
            link_attributes:
              class:
                - disabled
  content:
    - type: component
      component: "bootstrap_ula_lscm:card_body"
      slots:
        title: "Special title treatment"
        text: "With supporting text below as a natural lead-in to additional content."
        content:
          type: component
          component: "bootstrap_ula_lscm:button"
          slots:
            label: "Go somewhere"
          props:
            variant: primary
            url: "#"
props:
  variant: default
  attributes:
    class:
      - text-center
