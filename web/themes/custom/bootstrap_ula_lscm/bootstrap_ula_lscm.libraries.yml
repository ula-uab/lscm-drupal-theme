# Bootstrap-italia library managed from theme setting UI
#libraries-ui:

# Bootstrap-italia library if you use a vanilla release
vanilla:
  version: 2.17.5
  css:
    theme:
      dist/css/bootstrap-italia.min.css: { minified: true }
  js:
    dist/js/bootstrap-italia.bundle.min.js: { minified: true }
    # dist/js/bootstrap-italia.min.js: { minified: true }
  dependencies:
    - core/drupal

# Bootstrap-italia library if you use a custom compiled library
custom:
  version: 2.17.5
  css:
    theme:
      dist/css/bootstrap-italia.min.css: { minified: true }
  js:
    dist/js/bootstrap-italia.bundle.min.js: { minified: true }
  dependencies:
    - core/drupal

# Bootstrap-italia library if you use a CDN
cdn:
  version: 2.17.5
  css:
    theme:
      https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.5/dist/css/bootstrap-italia.min.css: { type: external, minified: true }
  js:
    https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.5/dist/js/bootstrap-italia.bundle.min.js: { type: external, minified: true }
    #https://cdn.jsdelivr.net/npm/bootstrap-italia@2.17.5/dist/js/bootstrap-italia.min.js: { type: external, minified: true }
  dependencies:
    - core/drupal

# Bootstrap-italia library if you use a webpack hot mode.
# If you need customize host and port, copy `<sub-theme>/webpack.settings.dist.js`
# in `<sub-theme>/webpack.settings.js` and edit `devServer.allowedHosts`
# and `devServer.port`.
hot:
  css:
    theme:
      http://127.0.0.1:8080/css/bootstrap-italia.min.css: { type: external, minified: true }
  js:
    http://127.0.0.1:8080/js/bootstrap-italia.min.js: { type: external, minified: true }
  dependencies:
    - core/drupal

# Bootstrap-italia library if you use a webpack hot mode with ddev
# For example, use this tip to expose 8080 port
# ---
# <project-name>/.ddev/docker-compose.ports.yaml
#
#   version: '3.6'
#   services:
#     web:
#       expose:
#         - 8080
#       ports:
#         - 8080:8080
ddev:
  css:
    theme:
      http://project-name.ddev.site:8080/css/bootstrap-italia.min.css: { type: external, minified: true }
  js:
    http://project-name.ddev.site:8080/js/bootstrap-italia.min.js: { type: external, minified: true }
  dependencies:
    - core/drupal

# ─────────────────────────────────────────────
# ULA — Design system propio (independiente de Bootstrap Italia)
# ─────────────────────────────────────────────

# Tokens globales (variables CSS). Cargada SIEMPRE vía info.yml (global).
ula_tokens:
  version: 1.0
  css:
    base:
      css/ula-tokens.css: {}

# Estilos base/globales de la landing (reset, container, section-*, botones, reveal).
# Depende de los tokens.
ula_landing_base:
  version: 1.0
  css:
    theme:
      css/ula-landing-base.css: {}
  dependencies:
    - bootstrap_ula_lscm/ula_tokens

# Marco de páginas de contenido (page.html.twig propio): rejilla y wrappers de regiones.
# Independiente de Bootstrap Italia. Depende de los tokens globales.
lscm_page:
  version: 1.0
  css:
    theme:
      css/lscm-page.css: {}
  dependencies:
    - bootstrap_ula_lscm/ula_tokens

# MATERIAL DE REFERENCIA DEL PILOTO — librería del CSS de los inline blocks A/B/C
# (banco /about-lb). Versionada como CASO DE USO DOCUMENTAL del modelo de inline
# blocks de Layout Builder, no como librería de producción. La adjuntan las
# plantillas del piloto vía attach_library. Ver docs/elements/layout/CONTENT-LAYOUT.md
# (ADR-LAYOUT-005 y guía «Body de sección con inline blocks»).
pilot:
  version: 1.0
  css:
    theme:
      css/pilot.css: {}
  dependencies:
    - bootstrap_ula_lscm/ula_tokens
